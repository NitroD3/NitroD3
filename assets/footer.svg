<svg xmlns="http://www.w3.org/2000/svg" width="850" height="120" viewBox="0 0 850 120">
  <defs>
    <style>
      @keyframes footerGlow { 0%,100%{opacity:0.6;} 50%{opacity:1;} }
      @keyframes spotDrift { 0%,100%{opacity:0.06;} 50%{opacity:0.14;} }
      .fg { animation: footerGlow 3s ease-in-out infinite; }
      .sd { animation: spotDrift 5s ease-in-out infinite; }
    </style>
    <linearGradient id="footerLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="20%" stop-color="#FF0040"/>
      <stop offset="50%" stop-color="#FFD700"/>
      <stop offset="80%" stop-color="#FF0040"/>
      <stop offset="100%" stop-color="#0D1117"/>
    </linearGradient>
    <linearGradient id="bgFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0D1117" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0D1117" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="850" height="120" fill="#0D1117"/>
  
  <!-- Bengal spots -->
  <ellipse class="sd" cx="100" cy="50" rx="35" ry="25" fill="#FF0040" opacity="0.06" transform="rotate(-20,100,50)"/>
  <ellipse class="sd" cx="300" cy="70" rx="28" ry="20" fill="#FFD700" opacity="0.05" transform="rotate(15,300,70)"/>
  <ellipse class="sd" cx="550" cy="40" rx="32" ry="22" fill="#FF6600" opacity="0.06" transform="rotate(-10,550,40)"/>
  <ellipse class="sd" cx="750" cy="65" rx="30" ry="21" fill="#FF0040" opacity="0.05" transform="rotate(25,750,65)"/>
  
  <!-- Top line -->
  <line class="fg" x1="0" y1="2" x2="850" y2="2" stroke="url(#footerLine)" stroke-width="2"/>
  
  <!-- Footer text -->
  <text x="425" y="45" text-anchor="middle" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="13" fill="#FFD700" font-weight="600" letter-spacing="4" class="fg">BUILD IN DARKNESS  ·  SHIP IN SILENCE  ·  CONQUER IN DAYLIGHT</text>
  
  <text x="425" y="72" text-anchor="middle" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="11" fill="#8B949E" letter-spacing="2">Self-taught  ·  Self-made  ·  Self-funded  ·  TRK TEAM 🔴</text>
  
  <text x="425" y="100" text-anchor="middle" font-family="'SF Mono','Fira Code','Cascadia Code','Consolas',monospace" font-size="11" fill="#30363D" letter-spacing="1">© 2006 — 2026 · NitroD3 · 20 years of code · 🐆</text>
  
  <!-- Bottom fade -->
  <rect width="850" height="120" fill="url(#bgFade)" opacity="0.3"/>
</svg>
